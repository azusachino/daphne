name: CI

on:
  push:
    branches: [ main, master, "feat/**", "fix/**" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: make lint

      - name: Format check
        run: make fmt-check

      - name: Unit tests
        run: make test

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and verify container image
        run: make verify CONTAINER_TOOL=docker
