apiVersion: v1
kind: ConfigMap
metadata:
  name: daphne-config
  namespace: harus-media
data:
  config.toml: |
    [app]
    telegram_api_url = "http://localhost:8081"
    video_upload_limit_mb = 256

    [rbac]
    public_commands = ["help"]

    [rbac.roles.admin]
    permissions = ["*"]

    [rbac.roles.standard_group]
    permissions = ["convert_link", "extract_audio", "preview_video", "download_video", "fetch_metadata"]

    [rbac.users]
    # Add your Telegram numeric user ID. Example:
    # 996596491 = "admin"

    [rbac.chats]
    # Add your chat/group IDs here. Example:
    # -1002058191932 = "standard_group"
