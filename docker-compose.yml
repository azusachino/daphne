services:
  daphne:
    build: .
    image: daphne:latest
    container_name: daphne
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    env_file:
      - ./.env
    environment:
      TZ: Asia/Tokyo
    volumes:
      - ./config/config.toml:/app/config.toml:ro
  telegram-bot-api:
    image: mirror.gcr.io/aiogram/telegram-bot-api:10.1
    container_name: daphne-telegram-bot-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TELEGRAM_LOCAL: "1"
      TZ: Asia/Tokyo
    ports:
      - "8081:8081"
    tmpfs:
      - /var/lib/telegram-bot-api
